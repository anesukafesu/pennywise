services:
  app:
    build: .
    command: ["npm", "run", "dev"]
    env_file:
      - .env.pennywise
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://pennywise:pennywise@postgres:5432/pennywise
      REDIS_URL: redis://redis:6379
    ports:
      - "80:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pennywise
    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pennywise
      POSTGRES_USER: pennywise
      POSTGRES_PASSWORD: pennywise
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pennywise -d pennywise"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pennywise-postgres:/var/lib/postgresql/data
    networks:
      - pennywise

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pennywise-redis:/data
    networks:
      - pennywise

networks:
  pennywise:
    driver: bridge

volumes:
  pennywise-postgres:
  pennywise-redis:
